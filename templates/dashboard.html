<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move2Earn Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
    /* Core page styling */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        background: linear-gradient(135deg, #6b2d9e 0%, #3d1a5f 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        min-height: 100vh;
        color: #fff;
    }
    
    .container {
        background: linear-gradient(135deg, #6b2d9e 0%, #3d1a5f 100%);
        min-height: 100vh;
        padding: 20px;
    }
    
    .dashboard-container {
        max-width: 1200px;
        margin: 0 auto;
    }
    
    .greeting-section {
        background: rgba(20, 10, 40, 0.6) !important;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
    }
    
    .greeting-section h2 {
        color: #fff;
        font-size: 28px;
        margin-bottom: 8px;
    }
    
    .greeting-section p {
        color: rgba(255, 255, 255, 0.8);
        font-size: 14px;
    }
    
    /* Card backgrounds */
    .gametime-card {
        background: linear-gradient(135deg, #00bcd4 0%, #00a8cc 100%) !important;
        border-radius: 12px;
        padding: 30px;
        margin-bottom: 20px;
        color: #fff;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    
    .gametime-header {
        font-size: 14px;
        opacity: 0.9;
        margin-bottom: 12px;
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 1px;
    }
    
    .gametime-value {
        font-size: 56px;
        font-weight: 700;
        margin-bottom: 8px;
        color: #fff;
    }
    
    .gametime-limit {
        font-size: 13px;
        opacity: 0.85;
        margin-bottom: 16px;
    }
    
    .gametime-bar {
        background: rgba(0, 0, 0, 0.2);
        height: 10px;
        border-radius: 5px;
        overflow: hidden;
    }
    
    .gametime-progress {
        background: rgba(255, 255, 255, 0.3);
        height: 100%;
        width: 0%;
        transition: width 0.3s ease;
    }
    
    .notifications-card {
        background: rgba(50, 20, 80, 0.7) !important;
        border-radius: 12px;
        margin-bottom: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        overflow: hidden;
    }
    
    .notifications-header {
        background: rgba(30, 10, 60, 0.8);
        padding: 16px 20px;
        color: #fff;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
    }
    
    .notifications-header h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
    }
    
    .notifications-toggle {
        cursor: pointer;
        transition: transform 0.3s ease;
    }
    
    .notifications-content {
        padding: 16px 20px;
        background: rgba(50, 20, 80, 0.7);
    }
    
    .streak-card {
        background: linear-gradient(135deg, #ff9800 0%, #ff6f00 100%) !important;
        border-radius: 12px;
        padding: 30px;
        margin-bottom: 30px;
        text-align: center;
        color: #fff;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    
    .streak-icon {
        font-size: 48px;
        margin-bottom: 12px;
    }
    
    .streak-label {
        font-size: 13px;
        opacity: 0.9;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
        margin-bottom: 8px;
    }
    
    .streak-count {
        font-size: 56px;
        font-weight: 700;
        margin: 8px 0;
        color: #fff;
    }
    
    .streak-sub {
        font-size: 12px;
        opacity: 0.85;
    }
    
    .streak-days {
        display: flex;
        gap: 8px;
        margin-top: 15px;
        justify-content: space-between;
    }
    
    .day-box {
        flex: 1;
        height: 35px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        font-size: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
    }
    
    .day-box.active {
        background: rgba(255, 255, 255, 0.4);
    }
    
    .activities-header {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 16px;
        color: #fff;
        padding: 0 0 16px 0;
    }
    
    .activities-header button {
        background: linear-gradient(135deg, #00bcd4 0%, #00d4ff 100%) !important;
        color: #000 !important;
        padding: 10px 16px !important;
        font-size: 12px !important;
        border-radius: 6px !important;
        border: none !important;
        cursor: pointer !important;
        font-weight: 600 !important;
        margin-left: auto;
    }
    
    #activities-list {
        background: transparent;
    }
    
    .activity-item {
        background: linear-gradient(135deg, rgba(100, 200, 50, 0.8) 0%, rgba(80, 180, 30, 0.8) 100%);
        border-radius: 12px;
        padding: 20px;
        display: grid;
        grid-template-columns: 60px 1fr auto;
        gap: 15px;
        align-items: start;
        margin-bottom: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .activity-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }
    
    .activity-icon {
        font-size: 32px;
        text-align: center;
        line-height: 1;
    }
    
    .activity-details {
        color: #fff;
    }
    
    .activity-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 4px;
    }
    
    .activity-time {
        font-size: 12px;
        opacity: 0.8;
    }
    
    .activity-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-top: 12px;
    }
    
    .stat-box {
        background: rgba(0, 0, 0, 0.2);
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 11px;
    }
    
    .stat-label {
        opacity: 0.8;
        font-size: 10px;
        text-transform: uppercase;
        display: block;
    }
    
    .stat-value {
        font-weight: 700;
        margin-top: 2px;
        font-size: 13px;
    }
    
    .activity-earned {
        text-align: right;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
    
    .earned-label {
        font-size: 11px;
        opacity: 0.8;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .earned-value {
        font-size: 24px;
        font-weight: 700;
    }
    
    .no-data {
        text-align: center;
        padding: 40px 20px;
        color: #aaa;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
    }
    
    .intensity-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        margin-left: 8px;
    }
    
    .intensity-easy {
        background: rgba(0, 212, 255, 0.3);
        color: #00d4ff;
    }
    
    .intensity-medium {
        background: rgba(255, 200, 0, 0.3);
        color: #ffcc00;
    }
    
    .intensity-hard {
        background: rgba(255, 100, 100, 0.3);
        color: #ff6464;
    }
    
    .notification-item {
        background: rgba(100, 150, 200, 0.2);
        border-left: 3px solid #00d4ff;
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 10px;
        font-size: 13px;
        color: #fff;
    }
    
    .notification-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
    }
    
    .notification-from {
        font-weight: 600;
        color: #00d4ff;
    }
    
    .notification-time {
        font-size: 11px;
        color: #999;
    }
    
    .notification-bonus {
        display: inline-block;
        background: rgba(0, 255, 136, 0.2);
        color: #00ff88;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        margin-top: 6px;
    }
    
    .notifications-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        user-select: none;
    }

    .modal-content {
        background: #1a0933 !important;
        padding: 30px;
        border-radius: 12px;
        max-width: 500px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        color: #fff;
    }
    
    .modal-content h2 {
        margin-bottom: 20px;
        font-size: 24px;
        color: #fff;
    }
    
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        justify-content: center;
        align-items: center;
    }

    .modal.active {
        display: flex !important;
    }

    .form-group {
        margin-bottom: 15px;
    }

    input[type="text"],
    input[type="date"],
    input[type="number"],
    select {
        width: 100%;
        padding: 10px 12px;
        background: rgba(100, 50, 150, 0.2) !important;
        border: 1px solid rgba(0, 212, 255, 0.3) !important;
        border-radius: 6px;
        color: #fff !important;
        font-size: 14px;
    }

    input[type="text"]::placeholder,
    input[type="number"]::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    select option {
        background: #1a0933;
        color: #fff;
    }

    button {
        padding: 12px 20px;
        background: linear-gradient(135deg, #00bcd4 0%, #00d4ff 100%);
        border: none;
        border-radius: 6px;
        color: #000;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
    }

    button.secondary {
        background: rgba(100, 50, 150, 0.4);
        color: #fff;
        border: 1px solid rgba(0, 212, 255, 0.3);
    }

    button.secondary:hover {
        background: rgba(100, 50, 150, 0.6);
    }

    .modal-stat {
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: space-between;
    }

    .modal-stat-label {
        color: #999;
        font-weight: 600;
        font-size: 12px;
    }

    .modal-stat-value {
        color: #fff;
        font-weight: 700;
    }

    /* Form styles */
    .form-group {
        margin-bottom: 15px;
    }

    input[type="text"],
    input[type="date"],
    input[type="number"],
    select {
        width: 100%;
        padding: 10px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        color: #fff;
        font-size: 14px;
    }

    input[type="text"]::placeholder,
    input[type="number"]::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    button {
        padding: 12px 20px;
        background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
        border: none;
        border-radius: 6px;
        color: #000;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 255, 136, 0.3);
    }

    button.secondary {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    button.secondary:hover {
        background: rgba(255, 255, 255, 0.15);
    }

    .modal-content {
        background: #0a0e27;
        padding: 30px;
        border-radius: 12px;
        max-width: 500px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        color: #fff;
    }

    .modal-content h2 {
        margin-bottom: 20px;
        font-size: 24px;
    }

    /* Loading spinner */
    .spinner {
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top: 3px solid #00ff88;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        display: inline-block;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
        .container {
            padding: 12px;
        }

        .dashboard-container {
            gap: 15px;
        }

        .greeting-section {
            padding: 20px;
            margin-bottom: 15px;
        }

        .greeting-section h2 {
            font-size: 20px;
        }

        .greeting-section p {
            font-size: 13px;
        }

        .gametime-card {
            padding: 20px;
        }

        .gametime-value {
            font-size: 36px;
        }

        .gametime-limit {
            font-size: 11px;
        }

        .notifications-card {
            padding: 15px;
        }

        .notifications-card h3 {
            font-size: 13px;
        }

        .notification-item {
            padding: 10px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .notification-header {
            flex-wrap: wrap;
        }

        .notification-time {
            font-size: 10px;
        }

        .streak-card {
            padding: 20px;
        }

        .streak-count {
            font-size: 32px;
        }

        .streak-days {
            gap: 6px;
        }

        .day-box {
            height: 32px;
            font-size: 10px;
        }

        .activities-header {
            font-size: 18px;
        }

        .activity-item {
            grid-template-columns: 50px 1fr auto;
            padding: 15px;
            gap: 12px;
        }

        .activity-icon {
            font-size: 28px;
        }

        .activity-title {
            font-size: 15px;
        }

        .activity-time {
            font-size: 11px;
        }

        .activity-stats {
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .stat-box {
            padding: 6px 8px;
            font-size: 10px;
        }

        .stat-value {
            font-size: 12px;
        }

        .earned-value {
            font-size: 20px;
        }

        .earned-label {
            font-size: 10px;
        }

        .intensity-badge {
            padding: 3px 8px;
            font-size: 10px;
            margin-left: 4px;
        }
    }

    @media (max-width: 480px) {
        .container {
            padding: 8px;
        }

        .dashboard-container {
            gap: 12px;
        }

        .greeting-section {
            padding: 15px;
            margin-bottom: 12px;
        }

        .greeting-section h2 {
            font-size: 18px;
        }

        .greeting-section p {
            font-size: 12px;
        }

        .gametime-card {
            padding: 15px;
        }

        .gametime-header {
            font-size: 12px;
        }

        .gametime-value {
            font-size: 32px;
            margin-bottom: 6px;
        }

        .gametime-limit {
            font-size: 10px;
        }

        .gametime-bar {
            height: 6px;
        }

        .notifications-card {
            padding: 12px;
        }

        .notifications-card h3 {
            font-size: 12px;
        }

        .notifications-header {
            margin-bottom: 10px;
        }

        .notification-item {
            padding: 8px;
            margin-bottom: 6px;
            font-size: 11px;
        }

        .notification-bonus {
            padding: 2px 6px;
            font-size: 10px;
        }

        .streak-card {
            padding: 15px;
        }

        .streak-icon {
            font-size: 20px;
        }

        .streak-label {
            font-size: 12px;
        }

        .streak-count {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .streak-sub {
            font-size: 11px;
        }

        .streak-days {
            gap: 4px;
            margin-top: 10px;
        }

        .day-box {
            height: 28px;
            font-size: 9px;
        }

        .activities-header {
            font-size: 16px;
            margin-bottom: 12px;
        }

        .activity-item {
            grid-template-columns: 45px 1fr auto;
            padding: 12px;
            gap: 10px;
            margin-bottom: 10px;
        }

        .activity-icon {
            font-size: 24px;
        }

        .activity-details {
            font-size: 12px;
        }

        .activity-title {
            font-size: 14px;
        }

        .activity-time {
            font-size: 10px;
        }

        .activity-stats {
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .stat-box {
            padding: 6px;
            font-size: 9px;
        }

        .stat-label {
            font-size: 8px;
        }

        .stat-value {
            font-size: 11px;
            margin-top: 1px;
        }

        .earned-label {
            font-size: 10px;
        }

        .earned-value {
            font-size: 18px;
        }
    }
    </style>
</head>
<body>
<div class="container">
    <div class="dashboard-container">
        <div class="greeting-section">
            <h2>Hi there! 👋</h2>
            <p>Keep moving to unlock more game time!</p>
        </div>

        <!-- Game Time Card -->
        <div class="gametime-card" id="gametimeCard">
            <div class="gametime-header">⏱️ Game Time Used</div>
            <div class="gametime-value" id="gametimeValue">-- min</div>
            <div class="gametime-limit" id="gametimeLimit">of 180 min limit</div>
            <div class="gametime-bar">
                <div class="gametime-progress" id="gametimeProgress" style="height: 100%; background: linear-gradient(90deg, #00ff88 0%, #00d4ff 100%); width: 0%; transition: width 0.3s ease;"></div>
            </div>
        </div>

        <!-- Notifications Card -->
        <div class="notifications-card">
            <div class="notifications-header" id="notificationsToggle">
                <h3>🔔 Notifications</h3>
                <span class="notifications-toggle" style="cursor: pointer;">▼</span>
            </div>
            <div class="notifications-content" id="notificationsContent" style="max-height: none; overflow: visible; padding: 15px;">
                <div id="messagesContainer"></div>
            </div>
        </div>

        <!-- Streak Card -->
        <div class="streak-card">
            <div class="streak-icon">🔥</div>
            <div class="streak-label">Streak</div>
            <div class="streak-count" id="streak-count" style="color: #fff;">0</div>
            <div class="streak-sub">Days in a row!</div>
            <div class="streak-days" id="streak-days">
                <div class="day-box">+5m</div>
                <div class="day-box">+7m</div>
                <div class="day-box">+9m</div>
                <div class="day-box">+11m</div>
                <div class="day-box">+13m</div>
            </div>
        </div>

        <!-- Activities Section -->
        <div>
            <div class="activities-header">
                ☰ Recent Activity
                <div style="display: flex; gap: 8px; margin-left: auto;">
                    <button onclick="openSimulateModal()" style="background: linear-gradient(135deg, #9c27b0 0%, #673ab7 100%); color: #fff; padding: 10px 16px; font-size: 12px;">⚡ Simulate</button>
                    <button onclick="openUploadModal()" style="background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%); color: #000; padding: 10px 16px; font-size: 12px;">+ Manual Upload</button>
                </div>
            </div>
            <div id="activities-list" style="margin-top: 20px;">
                <div class="no-data">
                    <div class="spinner"></div>
                    <p>Loading activities...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Activity Modal -->
<div class="modal" id="activity-modal">
    <div class="modal-content">
        <h2 id="modal-title">Activity Details</h2>
        <div id="modal-body"></div>
        <button class="secondary" onclick="closeModal()" style="margin-top: 20px; width: 100%;">Close</button>
    </div>
</div>

<!-- Upload Modal -->
<div class="modal" id="upload-modal">
    <div class="modal-content">
        <h2>📝 Log Activity</h2>
        <form id="uploadForm">
            <div class="form-group">
                <input type="text" name="activity_title" placeholder="Activity Title" required>
            </div>
            <div class="form-group">
                <input type="date" name="date" required>
            </div>
            <div class="form-group">
                <select name="activity_type" required>
                    <option value="">Select type</option>
                    <option value="Run">Run</option>
                    <option value="Ride">Cycling</option>
                    <option value="Swim">Swimming</option>
                    <option value="Walk">Walking</option>
                </select>
            </div>
            <div class="form-group">
                <input type="number" name="distance" placeholder="Distance (km)" step="0.1" min="0" required>
            </div>
            <div class="form-group">
                <input type="text" name="duration" placeholder="Duration (HH:MM:SS)" pattern="^\d{1,2}:\d{2}:\d{2}$" required>
            </div>
            <div class="form-group">
                <select name="intensity" required>
                    <option value="">Select intensity</option>
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>
            </div>
            <button type="submit" style="width: 100%;">Log Activity</button>
            <button type="button" class="secondary" onclick="closeUploadModal()" style="width: 100%;">Cancel</button>
        </form>
    </div>
</div>

<!-- Simulate Modal -->
<div class="modal" id="simulate-modal">
    <div class="modal-content">
        <h2>⚡ Simulate Activities</h2>
        <form id="simulateForm">
            <div class="form-group">
                <input type="number" name="count" min="1" max="100" value="5" required placeholder="Number of activities">
            </div>
            <p style="color: #999; font-size: 12px;">Generate 1-100 test activities</p>
            <button type="submit" style="width: 100%;">Generate</button>
            <button type="button" class="secondary" onclick="closeSimulateModal()" style="width: 100%; margin-top: 10px;">Cancel</button>
        </form>
    </div>
</div>

<script>
// Load activities from API
function loadActivities() {
    fetch('/api/activities')
        .then(r => r.json())
        .then(data => {
            const list = document.getElementById('activities-list');
            if (!data.activities || data.activities.length === 0) {
                list.innerHTML = '<div class="no-data">No activities yet. Start moving! 🏃</div>';
                return;
            }
            list.innerHTML = data.activities.map(a => `
                <div class="activity-item" onclick="openActivityModal('${a.id}')">
                    <div class="activity-icon">🏃</div>
                    <div class="activity-details">
                        <div class="activity-title">${a.name}</div>
                        <div class="activity-time">${new Date(a.start_date).toLocaleDateString()}</div>
                        <div class="activity-stats">
                            <div class="stat-box"><span class="stat-label">Distance</span><span class="stat-value">${a.distance || 0} km</span></div>
                            <div class="stat-box"><span class="stat-label">Time</span><span class="stat-value">${a.moving_time ? Math.round(a.moving_time / 60) : 0}m</span></div>
                        </div>
                    </div>
                    <div class="activity-earned">
                        <div class="earned-label">Earned</div>
                        <div class="earned-value">+${a.earned_minutes || 0}m</div>
                    </div>
                </div>
            `).join('');
        })
        .catch(err => {
            document.getElementById('activities-list').innerHTML = '<div class="error" style="color: #ff6464;">Failed to load activities</div>';
            console.error('Error loading activities:', err);
        });
}

// Load game time from API
function loadGameTime() {
    fetch('/api/gametime-balance')
        .then(r => r.json())
        .then(data => {
            const used = Math.round(data.used || 0);
            const limit = data.limit || 180;
            document.getElementById('gametimeValue').textContent = used + ' min';
            document.getElementById('gametimeLimit').textContent = `of ${limit} min limit`;
            document.getElementById('gametimeProgress').style.width = Math.min(100, (used / limit) * 100) + '%';
            if (data.streak_count) {
                document.getElementById('streak-count').textContent = data.streak_count;
            }
        })
        .catch(err => console.error('Error loading game time:', err));
}

// Load parent messages
function loadParentMessages() {
    fetch('/api/get-parent-messages')
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById('messagesContainer');
            if (!data.messages || data.messages.length === 0) {
                container.innerHTML = '<div class="no-messages" style="text-align: center; color: #999;">No notifications yet 🎉</div>';
                return;
            }
            container.innerHTML = data.messages.map(m => `
                <div class="notification-item">
                    <div class="notification-header">
                        <span class="notification-from">💬 ${m.from_parent}</span>
                        <span class="notification-time">${new Date(m.created_at).toLocaleDateString()}</span>
                    </div>
                    <div>${m.message}</div>
                    ${m.bonus_minutes ? `<div class="notification-bonus">+${m.bonus_minutes} min game time</div>` : ''}
                </div>
            `).join('');
        })
        .catch(err => console.error('Error loading messages:', err));
}

// Modal functions
function openActivityModal(id) {
    fetch(`/api/activity/${id}`)
        .then(r => r.json())
        .then(data => {
            document.getElementById('modal-title').textContent = data.name || 'Activity';
            document.getElementById('modal-body').innerHTML = `
                <div class="modal-stat">
                    <span class="modal-stat-label">Type</span>
                    <span class="modal-stat-value">${data.type}</span>
                </div>
                <div class="modal-stat">
                    <span class="modal-stat-label">Date</span>
                    <span class="modal-stat-value">${new Date(data.start_date).toLocaleDateString()}</span>
                </div>
                <div class="modal-stat">
                    <span class="modal-stat-label">Distance</span>
                    <span class="modal-stat-value">${data.distance} km</span>
                </div>
                <div class="modal-stat">
                    <span class="modal-stat-label">Duration</span>
                    <span class="modal-stat-value">${Math.round(data.moving_time / 60)} minutes</span>
                </div>
                <div class="modal-stat">
                    <span class="modal-stat-label">Time Earned</span>
                    <span class="modal-stat-value">${data.earned_minutes || 0} min</span>
                </div>
            `;
            document.getElementById('activity-modal').classList.add('active');
        })
        .catch(err => console.error('Error loading activity:', err));
}

function closeModal() {
    document.getElementById('activity-modal').classList.remove('active');
}

function openUploadModal() {
    document.getElementById('upload-modal').classList.add('active');
}

function closeUploadModal() {
    document.getElementById('upload-modal').classList.remove('active');
}

function openSimulateModal() {
    document.getElementById('simulate-modal').classList.add('active');
}

function closeSimulateModal() {
    document.getElementById('simulate-modal').classList.remove('active');
}

// Handle upload form
document.addEventListener('DOMContentLoaded', function() {
    const uploadForm = document.getElementById('uploadForm');
    if (uploadForm) {
        uploadForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            try {
                const response = await fetch('/upload-activity', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        activity_title: document.querySelector('[name="activity_title"]').value,
                        date: document.querySelector('[name="date"]').value,
                        activity_type: document.querySelector('[name="activity_type"]').value,
                        distance: document.querySelector('[name="distance"]').value,
                        intensity: document.querySelector('[name="intensity"]').value
                    })
                });
                if (response.ok) {
                    closeUploadModal();
                    loadActivities();
                    loadGameTime();
                } else {
                    alert('Error uploading activity');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });
    }

    const simulateForm = document.getElementById('simulateForm');
    if (simulateForm) {
        simulateForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            try {
                const response = await fetch('/api/simulate-activities', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count: parseInt(document.querySelector('[name="count"]').value) })
                });
                if (response.ok) {
                    closeSimulateModal();
                    loadActivities();
                    loadGameTime();
                } else {
                    alert('Error simulating activities');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });
    }

    // Notifications toggle
    const toggle = document.getElementById('notificationsToggle');
    if (toggle) {
        toggle.addEventListener('click', function() {
            const content = document.getElementById('notificationsContent');
            const icon = this.querySelector('.notifications-toggle');
            content.style.display = content.style.display === 'none' ? 'block' : 'none';
            icon.style.transform = content.style.display === 'none' ? 'rotate(0deg)' : 'rotate(180deg)';
        });
    }

    // Initial load
    loadActivities();
    loadGameTime();
    loadParentMessages();

    // Refresh every 5 seconds
    setInterval(() => {
        loadActivities();
        loadGameTime();
        loadParentMessages();
    }, 5000);
});

// Close modals on background click
window.addEventListener('click', function(e) {
    if (e.target.id === 'activity-modal') closeModal();
    if (e.target.id === 'upload-modal') closeUploadModal();
    if (e.target.id === 'simulate-modal') closeSimulateModal();
});
</script>
</body>
</html>
